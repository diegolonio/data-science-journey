server {
    listen 8090;
    server_name localhost;

    # Carpeta donde viven los archivos (montada desde ./src)
    root /var/www/html;
    index index.php;

    # Archivos normales (css, imágenes, etc.); si no, manda a index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cualquier archivo .php se lo pasa a php-fpm para que lo ejecute
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
